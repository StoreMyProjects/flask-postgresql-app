apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: two-tier-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: two-tier-app

  minReplicas: 2
  maxReplicas: 6

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60