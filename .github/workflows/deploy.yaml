name: Dev build Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: exploreexpeditionsapp
  CLUSTER_NAME: devops-eks

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: v1.0.${{ github.run_number }}-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc-role
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:${IMAGE_TAG} . -f Dockerfile.app

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:${IMAGE_TAG} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}

      - name: Push image to ECR
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: StoreMyProjects/flask-postgresql-app-gitops
          token: ${{ secrets.GH_PAT }}
          path: gitops

      - name: Update DEV Overlay
        run: |
          cd gitops/overlays/dev/app
          sed -i "s/newTag:.*/newTag: ${IMAGE_TAG}/" kustomization.yaml

      - name: Commit and Push Changes
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "DEV Release ${IMAGE_TAG}" || echo "No changes"
          git push

      - name: Deployment Summary
        run: |
          echo "DEV deployment completed"
          echo "Image: ${IMAGE_TAG}"